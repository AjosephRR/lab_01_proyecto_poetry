name: Orders Packaging CI

on:
  push:
    branches: [master, main]
    paths:
      - "avanzado/02-empaquetado-distribucion-cicd/lab_orders_packaging_cicd/**"
      - ".github/workflows/orders-packaging-ci.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "avanzado/02-empaquetado-distribucion-cicd/lab_orders_packaging_cicd/**"
      - ".github/workflows/orders-packaging-ci.yml"
  workflow_dispatch:

env:
  LAB_DIR: avanzado/02-empaquetado-distribucion-cicd/lab_orders_packaging_cicd
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/orders-packaged-api

jobs:
  quality:
    name: Lint, type-check and tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.LAB_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: isort check
        run: poetry run isort --check-only .

      - name: black check
        run: poetry run black --check .

      - name: ruff check
        run: poetry run ruff check .

      - name: mypy
        run: poetry run mypy src

      - name: pytest
        run: poetry run pytest -q

  build-wheel:
    name: Build wheel artifact
    runs-on: ubuntu-latest
    needs: quality

    defaults:
      run:
        working-directory: ${{ env.LAB_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry

      - name: Build wheel
        run: poetry build -f wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: orders-wheel
          path: ${{ env.LAB_DIR }}/dist/*.whl

  docker:
    name: Build and push container image
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && (github.ref_name == 'master' || github.ref_name == 'main')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./avanzado/02-empaquetado-distribucion-cicd/lab_orders_packaging_cicd
          file: ./avanzado/02-empaquetado-distribucion-cicd/lab_orders_packaging_cicd/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}